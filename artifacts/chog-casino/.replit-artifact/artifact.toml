kind = "web"
previewPath = "/"
title = "Chog Casino"
version = "1.0.0"
id = "artifacts/chog-casino"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21107

[services.development]
run = "pnpm --filter @workspace/chog-casino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chog-casino", "run", "build" ]
publicDir = "artifacts/chog-casino/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21107"
BASE_PATH = "/"
