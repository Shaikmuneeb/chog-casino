[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
monad_mainnet = "https://rpc.monad.xyz"

[etherscan]
# Fill in a Monad-compatible block explorer API key/URL here before verifying.
monad_mainnet = { key = "${MONAD_EXPLORER_API_KEY}", url = "https://explorer.monad.xyz/api" }
